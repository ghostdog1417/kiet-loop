version: '3.8'
services:
  backend:
    build: ./backend
    ports:
      - "5000:5000"
    env_file: .env
    depends_on:
      - mongo
  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    env_file: .env
    depends_on:
      - backend
  mongo:
    image: mongo:6
    restart: always
    volumes:
      - mongo_data:/data/db
volumes:
  mongo_data:
